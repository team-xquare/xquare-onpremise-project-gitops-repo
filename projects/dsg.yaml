applications:
  - name: dsg
    build:
      gradle:
        buildCommand: ./gradlew build -x test
        jarOutputPath: /build/libs/*.jar
        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: main
      hash: d53a922b8edba29c1091b02828629884253ed4a5
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
        - ""
  - name: dsg-fe
    build:
      vite:
        buildCommand: npm ci && npm run build
        distPath: /dist
        nodeVersion: "24"
    endpoints:
      - port: 8080
        routes:
          - dsg.dsmhs.kr
    github:
      branch: main
      hash: d8eb399aa6e48c734f21cb56ee511a2cc600ac64
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Frontend
      triggerPaths:
        - ""
addons:
  - name: dsg-mysql
    storage: 5Gi
    type: mysql
  - name: dsg-redis
    storage: 5Gi
    type: redis
