applications:
  - name: dsg
    build:
      gradle:
        buildCommand: ./gradlew build -x test
        jarOutputPath: /build/libs/*.jar
        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: main
      hash: c09182527b4b863ca842061ddd18ffa939760771
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
        - ""
  - name: dsg-fe
    build:
      vite:
        buildCommand: npm ci && npm run build
        distPath: /dist
        nodeVersion: "24"
    endpoints:
      - port: 8080
        routes:
          - dsg.dsmhs.kr
    github:
      branch: main
      hash: d485e4fffbdb996e6bd0aeb43c1579e988af7ef7
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Frontend
      triggerPaths:
        - ""
addons:
  - name: dsg-mysql
    storage: 5Gi
    type: mysql
  - name: dsg-redis
    storage: 5Gi
    type: redis
