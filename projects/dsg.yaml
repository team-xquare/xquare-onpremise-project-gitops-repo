applications:
  - name: dsg
    build:
      gradle:
        buildCommand: ./gradlew build -x test
        jarOutputPath: /build/libs/*.jar
        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: develop
      hash: f9fe19702919e99cb3e0aa01ac55fbf4442bbe41
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
        - ""
  - name: dsg-fe
    build:
      vite:
        buildCommand: npm ci && npm run build
        distPath: /dist
        nodeVersion: "24"
    endpoints:
      - port: 8080
        routes:
          - dsg.dsmhs.kr
    github:
      branch: main
      hash: 07c1ebe998eb0c81ac39cdefa279cdfbda57fcda
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Frontend
      triggerPaths:
        - ""
addons:
  - name: dsg-mysql
    storage: 5Gi
    type: mysql
  - name: dsg-redis
    storage: 5Gi
    type: redis
