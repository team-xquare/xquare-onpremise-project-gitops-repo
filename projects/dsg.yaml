    build:
      gradle:
        buildCommand: ./gradlew build -x test
        jarOutputPath: /build/libs/*.jar
        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: main
      hash: d21be426242e63307297d1fb420e3cebfcac8d3d
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
        - ""
  - name: dsg-fe
    build:
      vite:
        buildCommand: npm ci && npm run build
        distPath: /dist
        nodeVersion: "24"
    endpoints:
      - port: 8080
        routes:
          - dsg.dsmhs.kr
    github:
      branch: main
      hash: eca46691234510d00e2c3836d22e25f80ea1a4c1
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Frontend
      triggerPaths:
        - ""
addons:
