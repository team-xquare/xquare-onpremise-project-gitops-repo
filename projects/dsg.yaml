applications:
  - name: dsg
    build:
      gradle:
        buildCommand: ./gradlew build -x test
        jarOutputPath: /build/libs/*.jar
        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: main
      hash: 48b48f16f2cbb9ff42ccf255de9be37b74bf0655
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
        - ""
  - name: dsg-fe
    build:
      vite:
        buildCommand: npm ci && npm run build
        distPath: /dist
        nodeVersion: "24"
    endpoints:
      - port: 8080
        routes:
          - dsg.dsmhs.kr
    github:
      branch: main
      hash: be6d658e60f048d0f1839360daacf3cdb1c30b8e
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Frontend
      triggerPaths:
        - ""
addons:
  - name: dsg-mysql
    storage: 5Gi
    type: mysql
  - name: dsg-redis
    storage: 5Gi
    type: redis
