        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: main
      hash: b35ba0530e80b9f8e212f520673e8081cf67f08d
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
