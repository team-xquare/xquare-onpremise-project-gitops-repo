        jarOutputPath: /build/libs/*.jar
        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: main
      hash: 3d05a65afa2c884d053ffd209382ebb3b767ab08
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
        - ""
  - name: dsg-fe
