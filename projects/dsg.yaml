        jarOutputPath: /build/libs/*.jar
        javaVersion: "17"
    endpoints:
      - port: 8080
        routes:
          - dsg-api.dsmhs.kr
    github:
      branch: main
      hash: d53a922b8edba29c1091b02828629884253ed4a5
      installationId: "113636619"
      owner: 2026DSG
      repo: DSG_Backend
      triggerPaths:
        - ""
  - name: dsg-fe
