owners:
  - 201966203
applications:
  - name: falletter-server-prod
    github:
      owner: FABLOFABLO
      repo: Falletter-Backend
      branch: main
      installationId: "131283039"
      hash: ed03bfc2f770c3ad2a8d16a68684436b57a3d5dc
      triggerPaths:
        - src/**
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew build
    endpoints:
      - port: 8080
        routes:
          - falletter-api.dsmhs.kr
  - name: falletter-server-dev
    github:
      owner: FABLOFABLO
      repo: Falletter-Backend
      branch: dev
      installationId: "131283039"
      hash: f6a77cdcc180acd3daa799efc4901ec678b97529
      triggerPaths:
        - src/**
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew build
    endpoints:
      - port: 8080
        routes:
          - falletter-dev-api.dsmhs.kr
addons:
  - name: falletter-mysql
    type: mysql
    storage: 30Gi
  - name: falletter-dev-mysql
    type: mysql
    storage: 30Gi
  - name: falletter-dev-redis
    type: redis
    storage: 30Gi
  - name: falletter-redis
    type: redis
    storage: 2Gi
