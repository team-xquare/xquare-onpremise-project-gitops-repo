applications:
  - name: falletter-server-prod
    github:
      owner: FABLOFABLO
      repo: Falletter-Backend
      branch: main
      installationId: "131283039"
      hash: d2442c36230f7fda3a1c8bd71e7d13695102d8f6
      triggerPaths:
        - src/**
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew build
    endpoints:
      - port: 8080
        routes:
          - falletter-api.dsmhs.kr
  - name: falletter-server-dev
    github:
      owner: FABLOFABLO
      repo: Falletter-Backend
      branch: dev
      installationId: "131283039"
      hash: 50be206701dd6f92fb1aa7dbd5d10e583328f9e1
      triggerPaths:
        - src/**
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew build
    endpoints:
      - port: 8080
        routes:
          - falletter-dev-api.dsmhs.kr
addons:
