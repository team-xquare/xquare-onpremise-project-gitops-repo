owners:
  - 201966203
applications:
  - name: falletter-server-prod
    github:
      owner: FABLOFABLO
      repo: Falletter-Backend
      branch: main
      installationId: "131283039"
      hash: cf5c454a628308425ea7f4e1bc7900756f4e49e7
      triggerPaths:
        - src/**
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew build
    endpoints:
      - port: 8080
        routes:
          - falletter-api.dsmhs.kr
  - name: falletter-server-dev
    github:
      owner: FABLOFABLO
      repo: Falletter-Backend
      branch: dev
      installationId: "131283039"
      hash: b20a079feb0db31e00ac7f0be7887813810e0519
      triggerPaths:
        - src/**
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew build
    endpoints:
      - port: 8080
        routes:
          - falletter-dev-api.dsmhs.kr
addons:
  - name: falletter-mysql
    type: mysql
    storage: 30Gi
  - name: falletter-dev-mysql
    type: mysql
    storage: 30Gi
  - name: falletter-dev-redis
    type: redis
    storage: 30Gi
  - name: falletter-redis
    type: redis
    storage: 2Gi
