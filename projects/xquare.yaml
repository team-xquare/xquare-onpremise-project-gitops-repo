owners:
  - 115498126
applications:
  - name: xquare-supporter-prod
    github:
      owner: team-xquare
      repo: xquare-community-manager
      branch: main
      installationId: "62433388"
      hash: e1405a7c9f9e81ae1b8c01dd9ace76c3856e838b
    build:
      docker:
        dockerfilePath: ./Dockerfile
        contextPath: .
  - name: infra-backend-stag
    disableNetworkPolicy: true
    github:
      owner: team-xquare
      repo: xquare-infra-backend-v3
      branch: develop
      installationId: "62433388"
      hash: 8f1bf03d87f2484aacce529e88dd4eb0690c58cd
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew bootJar -x test
    endpoints:
      - port: 8080
        routes:
          - infra-backend-stag.dsmhs.kr
  - name: infra-backend-prod
    disableNetworkPolicy: true
    github:
      owner: team-xquare
      repo: xquare-infra-backend-v3
      branch: main
      installationId: "62433388"
      hash: dd1827943321552a59d15d29a6ad245241ac7d23
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew bootJar -x test
    endpoints:
      - port: 8080
        routes:
          - infra-backend.dsmhs.kr
  - name: infra-frontend-stag
    github:
      owner: team-xquare
      repo: xquare-infra-frontend-v3
      branch: develop
      installationId: "62433388"
      hash: dcd00b4084d941ac10054c2dac4743c1f46df9a6
    build:
      vite:
        nodeVersion: "20"
        buildCommand: TYPE=stag npm install -g bun@1.3.5 && bun install --frozen-lockfile && bun x turbo build --filter=@xquare/user-application
        distPath: /applications/xquare-user-application/dist
    endpoints:
      - port: 8080
        routes:
          - xquare-stag.dsmhs.kr
  - name: infra-frontend-prod
    github:
      owner: team-xquare
      repo: xquare-infra-frontend-v3
      branch: main
      installationId: "62433388"
      hash: 98d494eb3f2e4435c6110050b19ffb7aaf57d46a
    build:
      vite:
        nodeVersion: "20"
        buildCommand: TYPE=prod npm install -g bun@1.3.5 && bun install --frozen-lockfile && bun x turbo build --filter=@xquare/user-application
        distPath: /applications/xquare-user-application/dist
    endpoints:
      - port: 8080
        routes:
          - xquare.dsmhs.kr
  - name: xquare-server
    disableNetworkPolicy: true
    github:
      owner: team-xquare
      repo: xquare-server
      branch: main
      installationId: "62433388"
      hash: 5b78582d1b74ba2c6ec64397633464f576dcadb5
    build:
      docker:
        dockerfilePath: ./Dockerfile
        contextPath: .
    endpoints:
      - port: 8080
        routes:
          - xquare-server.dsmhs.kr
addons:
  - name: xquare-supporter-mongodb
    type: mongodb
    storage: 1Gi
  - name: xquare-infra-mysql
    type: mysql
    storage: 1Gi
  - name: xquare-infra-mysql-stag
    type: mysql
    storage: 1Gi
  - name: xquare-infra-redis-stag
    storage: 3Gi
    type: mysql
