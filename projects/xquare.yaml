applications:
  - name: xquare-supporter-prod
    github:
      owner: team-xquare
      repo: xquare-community-manager
      branch: main
      installationId: "62433388"
      hash: e1405a7c9f9e81ae1b8c01dd9ace76c3856e838b
    build:
      docker:
        dockerfilePath: ./Dockerfile
        contextPath: .
  - name: infra-backend-stag
    disableNetworkPolicy: true
    github:
      owner: team-xquare
      repo: xquare-infra-backend-v3
      branch: develop
      installationId: "62433388"
      hash: e0b8e4cc73439c74dc020dedbbdff35eb0c25889
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew bootJar -x test
    endpoints:
      - port: 8080
        routes:
          - infra-backend-stag.dsmhs.kr
  - name: infra-backend-prod
    disableNetworkPolicy: true
    github:
      owner: team-xquare
      repo: xquare-infra-backend-v3
      branch: main
      installationId: "62433388"
      hash: dd1827943321552a59d15d29a6ad245241ac7d23
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew bootJar -x test
    endpoints:
      - port: 8080
        routes:
          - infra-backend.dsmhs.kr
  - name: infra-frontend-stag
    github:
      owner: team-xquare
      repo: xquare-infra-frontend-v3
      branch: develop
      installationId: "62433388"
      hash: 42a807bc09e52a306f09effdee01684e7c60be08
    build:
      vite:
        nodeVersion: "20"
        buildCommand: TYPE=stag npm install -g bun@1.3.5 && bun install --frozen-lockfile && bun x turbo build --filter=@xquare/user-application
        distPath: /applications/xquare-user-application/dist
    endpoints:
      - port: 8080
        routes:
          - xquare-stag.dsmhs.kr
  - name: infra-frontend-prod
    github:
      owner: team-xquare
      repo: xquare-infra-frontend-v3
      branch: main
      installationId: "62433388"
      hash: e5317c5393399378a0944d98d0ed3960e0a41769
    build:
      vite:
        nodeVersion: "20"
        buildCommand: TYPE=prod npm install -g bun@1.3.5 && bun install --frozen-lockfile && bun x turbo build --filter=@xquare/user-application
        distPath: /applications/xquare-user-application/dist
    endpoints:
      - port: 8080
        routes:
          - xquare.dsmhs.kr
  - name: xquare-server
    disableNetworkPolicy: true
    github:
      owner: team-xquare
      repo: xquare-server
      branch: main
      installationId: "62433388"
      hash: 5b78582d1b74ba2c6ec64397633464f576dcadb5
    build:
      docker:
        dockerfilePath: ./Dockerfile
        contextPath: .
    endpoints:
      - port: 8080
        routes:
          - xquare-server.dsmhs.kr
addons:
