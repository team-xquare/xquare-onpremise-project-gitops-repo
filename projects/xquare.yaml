    type: mongodb
    storage: 1Gi
  - name: xquare-infra-mysql
    type: mysql
    storage: 1Gi
  - name: xquare-infra-mysql-stag
    type: mysql
    storage: 1Gi
  - name: xquare-infra-redis-stag
    storage: 1Gi
