owners:
    - 115498126
applications:
    - name: nexus-gateway
      github:
        owner: afjuiekafdjsf
        repo: nexus-gateway
        branch: main
        installationId: "115790141"
      build:
        docker:
            dockerfilePath: ./Dockerfile
            contextPath: .
      endpoints:
        - port: 8080
          routes:
            - nexus-api.dsmhs.kr
addons:
    - name: nexuskafka
      type: kafka
      storage: 2Gi
    - name: nexusredis
      type: redis
      storage: 1Gi
    - name: nexussearch
      type: opensearch
      storage: 2Gi
    - name: nexusdb
      type: postgresql
      storage: 2Gi
