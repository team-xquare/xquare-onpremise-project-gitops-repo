applications:
  - name: bookmaru
    build:
      docker:
        contextPath: BookMaru
        dockerfilePath: BookMaru\docker-compose.yml
    endpoints:
      - port: 8080
        routes:
          - bookmaru.dsmhs.kr
    github:
      branch: develop
      hash: ""
      installationId: "123057250"
      owner: plain-bookshelf
      repo: BookMaru-BE
      triggerPaths:
        - BookMaru\bookmaru-infrastructure\src
        - BookMaru\bookmaru-application\src
addons:
  - name: bookmaru-db
    storage: 5Gi
    type: postgresql
  - name: bookmaru-redis
    storage: 2Gi
    type: redis
  - name: bookmaru-elasticsearch
    storage: 5Gi
    type: elk
