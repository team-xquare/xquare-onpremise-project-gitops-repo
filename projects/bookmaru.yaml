applications:
  - name: bookmaru
    build:
      docker:
        contextPath: ./
        dockerfilePath: Dockerfile
    endpoints:
      - port: 8080
        routes:
          - bookmaru.dsmhs.kr
    github:
      branch: develop
      installationId: "123057250"
      owner: plain-bookshelf
      repo: BookMaru-BE
      triggerPaths:
        - ""
      hash: "a3f4947098fd3b48e20fda689f4f604654e48474"
addons:
  - name: bookmaru-db
    storage: 5Gi
    type: postgresql
  - name: bookmaru-redis
    storage: 2Gi
    type: redis
  - name: bookmaru-elasticsearch
    storage: 5Gi
    type: elk
