        contextPath: ./
        dockerfilePath: Dockerfile
    endpoints:
      - port: 80
        routes:
          - bookmaru.dsmhs.kr
    github:
      branch: develop
      installationId: "123057250"
      owner: plain-bookshelf
      repo: BookMaru-BE
      triggerPaths:
        - ""
