owners:
    - id: 115498126
      username: in-jun
applications:
    - name: backend
      github:
        owner: team-xquare
        repo: xquare-cli
        branch: main
        installationId: "62433388"
      build:
        go:
            goVersion: "1.21"
            buildCommand: go build -o app .
            binaryName: app
      endpoints:
        - port: 8080
    - name: frontend
      github:
        owner: team-xquare
        repo: xquare-cli
        branch: main
        installationId: "62433388"
      build:
        react:
            nodeVersion: "20"
            buildCommand: npm run build
            distPath: dist
      endpoints:
        - port: 3000
          routes:
            - frontend.dsmhs.kr
addons:
    - name: mydb
      type: mysql
      storage: 10Gi
