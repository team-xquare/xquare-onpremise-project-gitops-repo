owners:
    - 163130634
applications:
    - name: gujeuk-check-in-server
      github:
        owner: GuJeuk-Check-in
        repo: GuJeuk-Check-In_server
        branch: main
        installationId: "90332669"
      build:
        gradle:
            javaVersion: "17"
            jarOutputPath: /build/libs/*.jar
            buildCommand: ./gradlew clean bootJar -x test --no-daemon
      endpoints:
        - port: 8080
addons:
    - name: mysql
      type: mysql
      storage: 2Gi
    - name: redis
      type: redis
      storage: 2Gi
