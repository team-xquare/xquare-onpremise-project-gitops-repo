owners:
    - 162133680
applications:
    - name: nsg-be
      github:
        owner: DSM-NSG
        repo: NSG-BE
        branch: main
        installationId: "125695172"
        triggerPaths:
            - requirements.txt
            - config/**
            - users/**
            - posts/**
            - places/**
            - images/**
            - Dockerfile
            - .gitignore
      build:
        django:
            pythonVersion: "3.13"
            buildCommand: pip install -r requirements.txt
            startCommand: cd config && python manage.py migrate && python manage.py runserver 0.0.0.0:8000
      endpoints:
        - port: 8000
addons:
    - name: db
      type: postgresql
      storage: 2Gi
