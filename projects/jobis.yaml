applications:
  - name: fe-student-prod
    github:
      owner: Team-return
      repo: JOBIS-FE-V2
      branch: main
      installationId: "82814703"
      hash: a9d7cef7e2cbb78783e58eaa6b00b5096103c8de
      triggerPaths:
        - apps/student/**
        - packages/**
        - package.json
        - yarn.lock
        - nx.json
        - tsconfig.base.json
    build:
      vite:
        nodeVersion: "23.11.0"
        distPath: /apps/student/dist
        buildCommand: "yarn install && yarn nx build student"
    endpoints:
