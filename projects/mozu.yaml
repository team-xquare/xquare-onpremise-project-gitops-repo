# Opt into centralized CI eventing (ci-system). Legacy per-app EventSource/Sensor/EventBus
# are disabled for this project; the central sensor (in ci-system) dispatches builds into
# this project's namespace. Requires the GitHub App's Push subscription accepted for team-mozu.
centralEventing: true
owners:
  - 158432938
applications:
  - name: mozu-server-v2-prod
    github:
      owner: team-mozu
      repo: mozu-BE-v2
      branch: main
      installationId: "64125603"
      hash: 55ae60f75ca702c7d9ce5389148fd251657b19c2
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew bootJar -x test
    endpoints:
      - port: 8080
        routes:
          - mozu-v2-prod.dsmhs.kr
  - name: mozu-server-v2-stag
    github:
      owner: team-mozu
      repo: mozu-BE-v2
      branch: develop
      installationId: "64125603"
      hash: 253f1243c0769f69f6a6aaf698a8179486cfbc6d
    build:
      gradle:
        javaVersion: "17"
        jarOutputPath: /build/libs/*.jar
        buildCommand: ./gradlew bootJar -x test
    endpoints:
      - port: 8080
        routes:
          - mozu-v2-stag.dsmhs.kr
addons:
  - name: mozu-mozu-server-v2-prod-mysql
    type: mysql
    storage: 1Gi
  - name: mozu-mozu-server-v2-stag-mysql
    type: mysql
    storage: 1Gi
  - name: mozu-redis
    type: redis
    storage: 1Gi
