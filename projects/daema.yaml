  - name: daema-seller-prod
    github:
      owner: kangeunchan
      repo: daema-coin-client
      branch: main
      installationId: "142275252"
      hash: 1b9cda099627feafb2ee78164df2d93f292b0310
      triggerPaths:
        - apps/seller/**
        - libs/**
        - package.json
        - bun.lock
        - turbo.json
        - tsconfig.json
        - tsconfig.base.json
    build:
      vite:
        nodeVersion: "22"
        buildCommand: export VITE_SELLER_API_BASE_URL=https://daema-server-prod.dsmhs.kr/api && npm install -g bun@1.3.14 && bun install --frozen-lockfile && bun run build --filter=@daema/seller
        distPath: /apps/seller/dist
    endpoints:
      - port: 8080
        routes:
          - daema-seller.dsmhs.kr
