applications:
  - name: backend-stag
    build:
      flask:
        buildCommand: pip install -r requirements.txt
        pythonVersion: "3"
        startCommand: uvicorn web:app --host 0.0.0.0 --port 8080  --workers 4
      django:
        buildCommand: pip install -r requirements.txt
        pythonVersion: 3.13.7
        startCommand: uvicorn web:app --host 0.0.0.0 --port 8080  --workers 4
    endpoints:
      - port: 8080
        routes:
          - backend-stag.dsmhs.kr
    github:
      branch: develop
      hash: c73a68a418c59fe0d047442a3923fb6cfe4a7843
      installationId: "139759859"
      owner: PLsDsm
      repo: backend-v1
      triggerPaths:
        - '**'
addons:
  - name: mysql
    storage: 1Gi
    type: mysql
