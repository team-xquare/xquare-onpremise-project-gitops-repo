applications:
  - name: backend-stag
    build:
      flask:
        buildCommand: pip install -r requirements.txt
        pythonVersion: "3.13.7"
        startCommand: uvicorn web:app --host 0.0.0.0 --port 8080  --workers 4
    endpoints:
      - port: 8080
        routes:
          - backend-stag.dsmhs.kr
    github:
      branch: develop
      hash: 386e694cb465cdc67c9b3e67ea3902a85e802db0
      installationId: "139759859"
      owner: PLsDsm
      repo: backend-v1
      triggerPaths:
        - '**'
addons:
  - name: mysql
    storage: 1Gi
    type: mysql
