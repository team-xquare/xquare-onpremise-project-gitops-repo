owners:
  - 115498126
applications:
  - name: web
    github:
      owner: voniq
      repo: web
      branch: main
      installationId: "116999868"
      triggerPaths:
        - app/**
        - components/**
        - lib/**
        - Dockerfile
        - package.json
    build:
      docker:
        dockerfilePath: ./Dockerfile
        contextPath: .
    endpoints:
      - port: 3000
        routes:
          - voniq.dsmhs.kr
  - name: api
    github:
      owner: voniq
      repo: api
      branch: main
      installationId: "116999868"
      hash: 0502daa1a4e369ca69d9f71d98dedc1c8f8cb789
      triggerPaths:
        - cmd/**
        - internal/**
        - Dockerfile
        - go.mod
        - go.sum
    build:
      docker:
        dockerfilePath: ./Dockerfile
        contextPath: .
    endpoints:
      - port: 8080
        routes:
          - voniq-api.dsmhs.kr
  - name: freeswitch
    github:
      owner: voniq
      repo: freeswitch
      branch: main
      installationId: "116999868"
      triggerPaths:
        - Dockerfile
        - conf/**
    build:
      docker:
        dockerfilePath: ./Dockerfile
        contextPath: .
    endpoints:
      - port: 8081
addons:
  - name: db
    type: postgresql
    storage: 2Gi
  - name: cache
    type: redis
    storage: 500Mi
