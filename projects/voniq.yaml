owners:
    - 115498126
applications:
    - name: web
      github:
        owner: voniq
        repo: web
        branch: main
        installationId: "116999868"
        triggerPaths:
            - app/**
            - components/**
            - lib/**
            - Dockerfile
            - package.json
      build:
        docker:
            dockerfilePath: ./Dockerfile
            contextPath: .
      endpoints:
        - port: 3000
          routes:
            - voniq.dsmhs.kr
addons:
    - name: db
      type: postgresql
      storage: 2Gi
    - name: cache
      type: redis
      storage: 500Mi
