{{- /*
PHASE 2 — lets the central sensor SA (ci-central-sensor-sa in ci-system, defined by the
k8s-resource ci-system chart) create Workflows in THIS project namespace. Bound per-project,
so the central SA's reach is exactly the namespaces that opted in. The Workflows still run as
this project's ci-workflow-sa, so build isolation is unchanged.
*/ -}}
{{- if $.Values.centralEventing }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-central-sensor-wf
  namespace: {{ include "project.namespace" . }}
  labels:
    {{- include "project.labels" . | nindent 4 }}
    app.kubernetes.io/component: ci-central-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-central-sensor-wf
subjects:
  - kind: ServiceAccount
    name: ci-central-sensor-sa
    namespace: ci-system
{{- end }}
