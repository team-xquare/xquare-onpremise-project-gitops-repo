{{- /*
Central CI sensor — ONE Sensor per PROJECT (not per app). Opt-in via `.Values.centralEventing`
(default off): existing per-app EventSource/Sensor stay untouched until a project flips it.

One Sensor lives in the central `ci-system` namespace (co-located with the shared EventBus +
receive-only EventSource, as Argo Events requires) and carries one dependency + one trigger
PER APP: each dependency filters that app's repo+branch+triggerPaths off the single central
stream, and each trigger dispatches the SAME `<app>-ci-pipeline-template` INTO the project
namespace (cross-ns), running as the project's own ci-workflow-sa. So 31 projects → 31 sensor
pods (vs 86 if per-app).

⚠️ Enabling this for a project while its old per-app sensors are still active = DOUBLE build.
Disable the project's per-app sensors as you migrate.
*/ -}}
{{- if .Values.centralEventing }}
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: {{ .Values.project }}-ci-sensor
  namespace: ci-system
  labels:
    {{- include "project.labels" . | nindent 4 }}
    app.kubernetes.io/component: ci-central-sensor
    ci.xquare/project: {{ .Values.project }}
spec:
  eventBusName: ci-central-eventbus
  template:
    serviceAccountName: ci-central-sensor-sa
    container:
      resources:
        requests:
          cpu: 10m
          memory: 30Mi
        limits:
          cpu: 100m
          memory: 96Mi
  dependencies:
    {{- range .Values.applications }}
    - name: {{ include "app.serviceName" . }}
      eventName: webhook
      eventSourceName: github-central
      filters:
        script: |
          if event.body['X-GitHub-Event'] ~= 'push' then return false end
          if event.body.repository == nil or event.body.repository.full_name ~= '{{ .github.owner }}/{{ .github.repo }}' then return false end
          if event.body.ref ~= 'refs/heads/{{ .github.branch }}' then return false end
          {{- if .github.triggerPaths }}
          local function g2p(s)
            if not s or s == "" then return ".*" end
            local p,i,l="",1,#s
            while i<=l do
              local c=s:sub(i,i)
              if c=="*" then
                if i+1<=l and s:sub(i+1,i+1)=="*" then
                  if i+2<=l and s:sub(i+2,i+2)=="/" then p,i=p..".-",i+3 else p,i=p..".*",i+2 end
                else p,i=p.."[^/]*",i+1 end
              elseif c=="?" then p,i=p.."[^/]",i+1
              elseif c=="[" then
                local j,v=i+1,false
                if j<=l and s:sub(j,j)=="!" then v,j=true,j+1 end
                while j<=l and s:sub(j,j)~="]" do j=j+1 end
                if j<=l then
                  local cls=s:sub(i,j)
                  if v then cls=cls:gsub("^%[!","[^") end
                  p,i=p..cls,j+1
                else p,i=p.."%[",i+1 end
              elseif c:match("[%.%+%-%^%$%(%)%%]") then p,i=p.."%"..c,i+1
              else p,i=p..c,i+1 end
            end
            return "^"..p.."$"
          end
          local function match(files,pats)
            if not pats or #pats==0 then return true end
            local paths={}
            for _,list in pairs(files) do for _,p in ipairs(list or {}) do table.insert(paths,p) end end
            if #paths==0 then return false end
            local inc,exc={},{}
            for _,pat in ipairs(pats) do
              if pat:sub(1,1)=="!" then table.insert(exc,g2p(pat:sub(2))) else table.insert(inc,g2p(pat)) end
            end
            for _,path in ipairs(paths) do
              local m=#inc==0
              if not m then for _,pat in ipairs(inc) do if path:match(pat) then m=true break end end end
              if m then for _,pat in ipairs(exc) do if path:match(pat) then m=false break end end end
              if m then return true end
            end
            return false
          end
          local cf={added={},modified={},removed={}}
          if event.body.commits then
            for _,c in ipairs(event.body.commits) do
              for _,f in ipairs(c.added or {}) do table.insert(cf.added,f) end
              for _,f in ipairs(c.modified or {}) do table.insert(cf.modified,f) end
              for _,f in ipairs(c.removed or {}) do table.insert(cf.removed,f) end
            end
          end
          if #cf.added==0 and #cf.modified==0 and #cf.removed==0 then
            if event.body.head_commit then
              for _,f in ipairs(event.body.head_commit.added or {}) do table.insert(cf.added,f) end
              for _,f in ipairs(event.body.head_commit.modified or {}) do table.insert(cf.modified,f) end
              for _,f in ipairs(event.body.head_commit.removed or {}) do table.insert(cf.removed,f) end
            end
          end
          return match(cf,{ {{- range $i, $path := .github.triggerPaths }}{{if $i}}, {{end}}"{{$path}}"{{- end}} })
          {{- else }}
          return true
          {{- end }}
    {{- end }}
  triggers:
    {{- range .Values.applications }}
    - retryStrategy:
        steps: 3
      template:
        name: {{ include "app.serviceName" . }}-trigger
        conditions: "{{ include "app.serviceName" . }}"
        k8s:
          operation: create
          parameters:
            - src:
                dependencyName: {{ include "app.serviceName" . }}
                dataKey: body.X-GitHub-Event
                value: ""
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: {{ include "app.serviceName" . }}
                dataKey: body.after
                value: ""
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: {{ include "app.serviceName" . }}
                dataKey: body.after
                value: ""
              dest: metadata.annotations.app\.kubernetes\.io/git-sha
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: {{ include "app.serviceName" . }}-ci-
                namespace: {{ include "project.namespace" $ }}
                labels:
                  {{- include "app.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: ci-workflow
                annotations:
                  app.kubernetes.io/git-sha: ""
              spec:
                workflowTemplateRef:
                  name: {{ include "app.serviceName" . }}-ci-pipeline-template
                arguments:
                  parameters:
                    - name: github-event-type
                      value: ""
                    - name: github-sha
                      value: ""
                podGC:
                  strategy: OnPodCompletion
                  deleteDelayDuration: 72h
                serviceAccountName: ci-workflow-sa
    {{- end }}
{{- end }}
